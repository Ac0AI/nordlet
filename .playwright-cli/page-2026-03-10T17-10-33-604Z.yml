    - generic [ref=e577]:
      - generic [ref=e579]:
        - paragraph [ref=e580]: Frågor & Svar
        - heading "Vanliga frågor" [level=2] [ref=e581]
      - generic [ref=e583]:
        - generic [ref=e584]:
          - button "Luktar det verkligen inte? Inte ens på sommaren?" [ref=e585] [cursor=pointer]:
            - generic [ref=e586]: Luktar det verkligen inte? Inte ens på sommaren?
            - img [ref=e587]
          - paragraph [ref=e590]: Vi vet att det låter för bra för att vara sant. Många har testat liknande lösningar och blivit besvikna. Men Frihetstoan använder värmeförsegling som skapar en 100% lufttät förslutning inom sekunder. Det gör den luktfri även i 30+ graders värme. Vi har över 2 300 kunder som bekräftar det. Och du har 30 dagars öppet köp om du vill testa själv.
        - generic [ref=e591]:
          - button "Hur funkar det egentligen?" [ref=e592] [cursor=pointer]:
            - generic [ref=e593]: Hur funkar det egentligen?
            - img [ref=e594]
          - paragraph [ref=e596]: Du använder toan precis som vanligt. När du trycker på knappen aktiveras en värmeförsegling som paketerar avfallet i en biologiskt nedbrytbar påse. Helt lufttätt. Inga kemikalier, inget vatten, ingen manuell hantering. Påsen slänger du i vanliga hushållssoporna.
        - generic [ref=e597]:
          - button "Är det inte som PACTO-toan som luktade?" [ref=e598] [cursor=pointer]:
            - generic [ref=e599]: Är det inte som PACTO-toan som luktade?
            - img [ref=e600]
          - paragraph [ref=e602]: Nej. PACTO använde vanlig plastförslutning utan värme. Frihetstoan använder en patenterad värmeförseglingsteknik som smälter ihop påsen till en helt lufttät enhet. Det är som att vakuumförpacka, inte bara knyta ihop en påse. Skillnaden i luktfrihet är enorm.
        - generic [ref=e603]:
          - button "Vad gör jag med påsarna? Kan man slänga dem i vanliga soporna?" [ref=e604] [cursor=pointer]:
            - generic [ref=e605]: Vad gör jag med påsarna? Kan man slänga dem i vanliga soporna?
            - img [ref=e606]
          - paragraph [ref=e608]: Ja. Påsarna är biologiskt nedbrytbara och slängs i vanliga hushållssoporna, precis som blöjor. Varje rulle räcker till 30 användningar.
        - generic [ref=e609]:
          - button "Jag har SOG idag. Är det här bättre?" [ref=e610] [cursor=pointer]:
            - generic [ref=e611]: Jag har SOG idag. Är det här bättre?
            - img [ref=e612]
          - paragraph [ref=e614]: SOG är en bra lösning för att minska kemikalieanvändningen. Men du behöver fortfarande kassettanken, fortfarande tömningsstationer, och fortfarande byta kolfilter. Med Frihetstoan slipper du allt det. Ingen kassettank. Ingen tömning. Inget filter. Bara en påse i soporna.
        - generic [ref=e615]:
          - button "Behöver man speciellt toalettpapper?" [ref=e616] [cursor=pointer]:
            - generic [ref=e617]: Behöver man speciellt toalettpapper?
            - img [ref=e618]
          - paragraph [ref=e620]: Nej, använd det toalettpapper du vill. Inget behov av vattenlösligt eller speciellt poröst papper. Allt hamnar i påsen och förseglas.
        - generic [ref=e621]:
          - button "Passar den i min husbil/husvagn?" [ref=e622] [cursor=pointer]:
            - generic [ref=e623]: Passar den i min husbil/husvagn?
            - img [ref=e624]
          - paragraph [ref=e626]: Frihetstoan är fristående och kräver ingen anslutning. Den är kompakt (445 × 355 mm) och den svängbara basen med 180° rotation gör att den passar även i trånga toautrymmen. Ingen installation behövs, du ställer den bara på plats.
        - generic [ref=e627]:
          - button "Hur lång tid räcker batteriet?" [ref=e628] [cursor=pointer]:
            - generic [ref=e629]: Hur lång tid räcker batteriet?
            - img [ref=e630]
          - paragraph [ref=e632]: Det inbyggda litium-jon batteriet räcker för flera dagars normal användning. Laddas enkelt via USB eller 12V-uttaget i husbilen medan du kör.
        - generic [ref=e633]:
          - button "Kan jag returnera om jag inte är nöjd?" [ref=e634] [cursor=pointer]:
            - generic [ref=e635]: Kan jag returnera om jag inte är nöjd?
            - img [ref=e636]
          - paragraph [ref=e638]: Absolut. Du har 30 dagars öppet köp med fri retur, inga frågor ställda. Vi tror så mycket på Frihetstoan att vi tar hela risken. Av alla som provat har 96% valt att behålla den.
