name: Auto-guide (Ludvig)

# Skriver en ny säsongsanpassad guide varannan vecka (1:a och 15:e, 08:00 UTC)
# via Claude API (Sonnet), committar den och deployar till Vercel.
on:
  schedule:
    - cron: "0 8 1,15 * *"
  workflow_dispatch: {} # tillåt manuell körning

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate guide
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-guide.mjs

      - name: Commit new guide if created
        id: commit
        run: |
          if [ -n "$(git status --porcelain content/guider)" ]; then
            git config user.name "nordlet-bot"
            git config user.email "bot@nordlet.se"
            git add content/guider
            git commit -m "content: ny guide (auto, Ludvig Eriksson)"
            git push
            echo "committed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Inga nya guider att committa."
            echo "committed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Vercel
        if: steps.commit.outputs.committed == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
        run: npx --yes vercel@latest deploy --prod --token="$VERCEL_TOKEN" --yes
